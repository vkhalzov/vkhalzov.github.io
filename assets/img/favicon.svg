<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="rounded">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="64" height="64" rx="14" fill="#050e1a"/>

  <!-- N7 red stripe — right edge, clipped -->
  <rect x="50" y="0" width="14" height="64" fill="#c41a1a" clip-path="url(#rounded)"/>

  <!-- subtle border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#4db8e8" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- corner bracket top-left -->
  <path d="M10 18 L10 10 L18 10" fill="none" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- VK -->
  <text
    x="28" y="46"
    font-family="Rajdhani, Arial Black, sans-serif"
    font-weight="700"
    font-size="38"
    fill="#ddeeff"
    text-anchor="middle"
    letter-spacing="-1"
  >VK</text>

  <!-- cyan underline -->
  <line x1="8" y1="52" x2="46" y2="52" stroke="#4db8e8" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
</svg>
