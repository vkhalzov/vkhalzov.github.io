  role: "Senior Full-Stack Engineer | Ruby on Rails · AI Integration · SaaS"
  summary: |
    Full-stack engineer with 17+ years of experience building commercial web products - from 460+ custom e-commerce projects for merchants worldwide to multi-engine SaaS platforms in Ruby on Rails.
    I specialize in backend-heavy product work: billing engines, multi-tenant data architecture, document generation, and real-time features. Over the last two years I have worked extensively with AI integration - building LLM-powered email automation, function-calling chat agents, and AWS Connect contact center pipelines using OpenAI and Anthropic APIs. I care about shipping clean, well-tested code that solves real business problems, and I take full ownership from architecture through implementation to delivery.
