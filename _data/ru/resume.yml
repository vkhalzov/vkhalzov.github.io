profile:
  firstname: "Владимир"
  lastname: "Хальзов"
  role: "Старший Full-Stack разработчик | Ruby on Rails · ИИ-интеграции · SaaS"
  summary: |
    Full-stack разработчик с 17+ годами опыта создания коммерческих веб-продуктов - от 460+ кастомных проектов для интернет-магазинов по всему миру до multi-engine SaaS-платформ на Ruby on Rails.
    Специализируюсь на сложной бэкенд-разработке: биллинговые движки, мультитенантная архитектура данных, генерация документов и real-time обновления. За последние два года активно работаю с ИИ-интеграциями - построил систему автоответов на базе LLM, слой function-calling для чат-агентов и пайплайн контактного центра на AWS Connect с использованием OpenAI и Anthropic API. Ценю чистый, хорошо протестированный код, решающий реальные бизнес-задачи, и беру на себя полную ответственность - от архитектуры до реализации и доставки.
