meta:
  title: "Владимир Хальзов · Старший Full-Stack разработчик"
  description: "Владимир Хальзов - старший Full-Stack разработчик с 17+ годами опыта в Ruby on Rails, ИИ-интеграциях и SaaS-продуктах."
