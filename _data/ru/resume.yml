experience:
  - title: "Старший Full-Stack разработчик"
    org: "CleverLabs"
    date: "Август 2020 - настоящее время"
    location: "Минск, Республика Беларусь"
    summary: "За 5+ лет участвовал в разработке двух B2B SaaS-продуктов в роли старшего full-stack Rails разработчика - от создания новых фич с нуля до интеграции ИИ и улучшения инфраструктуры."
    bullets:
      - "Спроектировал систему автоответов на входящие письма на базе OpenAI Assistants API: многоступенчатый пайплайн, ролевые ИИ-ассистенты, UI отправки/редактирования/регенерации и дашборд статистики с просмотром diff"
      - "Разработал слой function-calling для ИИ-ассистентов чата (поддержка и HR); интегрировал Anthropic Claude API для извлечения данных из PDF-документов"
      - "Реализовал интеграцию с AWS Connect: автосвязка голосовых и чат-контактов с тикетами поддержки, форматирование транскриптов и анализ после звонка"
      - "Участвовал в разработке MCP-сервера с 10+ инструментами для внешних ИИ-агентов: поиск работодателей и сотрудников, маршрутизация обращений, данные по льготам"
      - "Построил с нуля SaaS-биллинговый Rails engine - Stripe PaymentIntents, 4 типа тарификации, многоуровневые тарифы, фоновые воркеры - взамен ChargeBee"
      - "Реализовал систему пассивного отказа от льгот для сотрудников, не завершивших enrollment, с покрытием всех типов событий и полной системой тестов"
      - "Участвовал в разработке модулей биллинга, заказов, инвентаря и идентификации мультидвижкового Rails SaaS для доставки; реализовал генерацию документов (упаковочные листы, инвойсы, PDF-счета) на базе Prawn PDF"
      - "Добавил обновление заказов в реальном времени через ActionCable; улучшил производительность с помощью HTTP-кеширования и защиты от тяжёлых запросов"
    stack: [Rails, PostgreSQL, Hotwire, React, AWS, OpenAI, "Anthropic Claude"]

  - title: "Ruby/Ruby on Rails разработчик"
    org: "iTechArt Group"
    date: "Июнь 2019 - Апрель 2020"
    location: "Минск, Республика Беларусь"
    summary: "Первая позиция на Ruby on Rails после перехода с PHP. Часть времени была посвящена оценке проектов и предпроектной аналитике; выполнял разработку на двух продуктах, совмещая с руководством небольшой командой."
    bullets:
      - "Менторил и курировал 3 junior-разработчиков, проводил регулярные code review и давал конструктивную техническую обратную связь"
      - "Построил с нуля полную систему JWT-аутентификации на бэкенде и во Vue.js фронтенде: route guards, ссылки для отписки на токенах, обработка истечения срока токена"
      - "Реализовал ролевую систему доступа (CanCanCan) с enforcement на бэкенде и условным UI на фронтенде (роли: admin, manager, developer)"
      - "Настроил асинхронные очереди email через Sidekiq и автоматизированные воркеры (рассылка опросов, напоминания, отслеживание опоздавших, синхронизация отпусков, загрузка праздников)"
      - "Участвовал в редизайне рекрутинговой SaaS-платформы: вакансии, ростеры кандидатов, планирование интервью, профили соискателей и state machine воркфлоу"
      - "Разработал с нуля модуль оценки soft skills для студентов: UI опроса, подсчёт баллов, оплата через Stripe, доставка результатов с PDF-вложением, интеграция с университетом WGU"
      - "Реализовал движок автоматического скоринга соответствия кандидатов вакансиям с MD5 hash-based определением изменений для запуска асинхронного пересчёта"
      - "Выполнил полный рефакторинг и переименование ключевой доменной сущности по всему коду: контроллеры, вью, роуты, фоновые задачи, БД"
      - "Интегрировал Sentry.io для отслеживания ошибок; исправил порядок запуска Docker-контейнеров"
    stack: [Rails, PostgreSQL, Vue.js, Sidekiq, Docker, RabbitMQ, Stripe]

  - title: "Старший PHP/Magento разработчик"
    org: "ASTRIO agency"
    date: "Февраль 2016 - Май 2019"
    location: "Ульяновск, Российская Федерация"
    summary: "Разрабатывал кастомные решения на Magento 1 и Magento 2 для e-commerce клиентов из сфер ритейла, моды, продуктов питания и образования. Работал на всех этапах проекта: анализ требований, оценка, разработка и поддержка после запуска."
    bullets:
      - "Выполнял миграции с Magento 1 на Magento 2, включая настройку мультисторов с разделением по регионам/валютам и перенос данных сторонних модулей"
      - "Интегрировал ERP-систему МойСклад: двусторонняя синхронизация остатков и цен, импорт/экспорт заказов, автоматическое создание накладных и отправлений"
      - "Разработал функцию «Проекты» для магазина мебели: инструмент планирования интерьера с добавлением товаров по комнатам и расчётом общей стоимости"
      - "Реализовал функцию «Скрыть цену / Запросить цену» для конфигурируемых товаров"
      - "Создал модуль SMS-уведомлений с подключаемым адаптером для различных SMS-провайдеров"
      - "Реализовал OAuth авторизацию через социальные сети (Facebook, Google, Яндекс, ВКонтакте, Mail.ru)"
      - "Интегрировал API ФНС для передачи электронных фискальных чеков по email/SMS"
      - "Добавил способы доставки (PickPoint, Почта России); платёжные шлюзы с поддержкой возвратов"
      - "Оптимизировал производительность с помощью FPC full-page caching и улучшения запросов к БД"
      - "Реализовал кастомные процессы оформления заказа (выбор оформления для печати, система коллективных заказов для школ с разграничением ролей учителей и учеников)"
      - "Интегрировал ActiveCampaign для синхронизации клиентов и маркетинговой автоматизации"
      - "Разработал REST API эндпоинты для мобильного приложения"
      - "Применял патчи безопасности и обеспечивал корректность кастомного кода после их установки"
    stack: ["PHP 5/7", "Magento 1/2", MySQL, jQuery, Knockout.js, Docker]

  - title: "Старший PHP-разработчик"
    org: "X-Cart"
    date: "Декабрь 2008 - Декабрь 2015"
    location: "Ульяновск, Российская Федерация"
    summary: "Выполнил более 460 проектов по заказной разработке для 230+ интернет-магазинов по всему миру на платформе X-Cart (v4.0-4.7 и 5.x)."
    bullets:
      - "Реализовывал функциональность по требованиям клиентов: подписки на товары, система бонусных баллов, рассрочка (layaway), реестр подарков, уведомления о поступлении товара, акции «купи X - получи Y», продажа дробными единицами, выбор даты доставки и открытки к подарку, поиск по марке/модели/году (MMY), фото 360, интеграции с MailChimp, iContact и Google Tag Manager, продажа цифровых товаров и DRM-книг через Adobe Content Server, аукционный модуль, мультикупоны и мультиуровни членства"
      - "Для X-Cart 5 разработал ООП-модули: расширенный НДС (UK VAT) с поддержкой B2B (reverse charge) и B2C (tax-inclusive) одновременно, конструктор коммерческих предложений, частичная оплата, умные фильтры товаров, экспорт IIF для бухгалтерии, библиотека материалов с доступом только для покупателей"
      - "Интегрировал 20+ платёжных шлюзов: eWAY Rapid 3, NAB Transact, Atlantic Bank, Paymate, Альфа-Банк, Affirm, Optimal Payments, BitPay, WorldPay FuturePay, TagPay, Smart Pay (с автообновлением статусов заказов), 2Checkout, Buckaroo, Mygate, PayTrace, OMPAY, ipay88, Amazon Prime Checkout, Google Checkout — а также реимплементация и обновления для SagePay, Heartland Web Connect, First Data, ABN AMRO iDEAL и других"
      - "Транспортные интеграции: Canada Post API, UPS Freight LTL, FedEx Freight, Unishippers API, экспорт Toll Priority"
      - "Разработал пайплайны импорта/экспорта: каталог Ma Labs, метаданные ONIX (University of Toronto Press), экспорт для Sears, выгрузки для дропшиппинговых сетей, Web Order Interface с шифрованием данных карт"
      - "Выполнял реимплементацию кастомных модификаций после каждого обновления версии (v4.0-4.7 и миграция на X-Cart 5), адаптируя код под изменившееся API и архитектуру"
      - "Обеспечивал гарантийную поддержку и прямое взаимодействие с клиентами; более 8 клиентов сотрудничали на протяжении нескольких лет"
    stack: ["PHP 4/5", MySQL, jQuery, "Doctrine ORM", Smarty]

